  <style>
    :root {
      --page-bg: #f5f1e8;
      --card-bg: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.85);
      --shadow: rgba(0, 0, 0, 0.18);
      --name-bg: rgba(0, 0, 0, 0.14);
      --missing-bg: rgba(255, 255, 255, 0.18);
      --stamp-red: #b40000;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--page-bg);
      color: #222;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .page-header h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3.2rem);
    }

    .page-header p {
      margin: 0;
      color: #555;
    }

    .tribe {
      background: var(--tribe-bg);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 10px 24px var(--shadow);
    }

    .tribe-title {
      text-align: center;
      margin: 0 0 20px;
      font-size: clamp(2rem, 5vw, 4.5rem);
      line-height: 1;
      letter-spacing: 1px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
    }

    .card {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .image-wrap {
      position: relative;
      height: 260px;
      border-radius: 14px;
      overflow: hidden;
      background: var(--card-bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-wrap img {
      max-width: calc(100% - 20px);
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .missing-image {
      color: var(--muted);
      background: var(--missing-bg);
      border: 2px dashed rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      width: calc(100% - 20px);
      height: calc(100% - 20px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px;
      font-weight: bold;
    }

    .name {
      margin-top: 10px;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--text);
      font-size: 1.8rem;
      font-weight: 700;
      padding: 10px 12px;
      border-radius: 12px;
      background: var(--name-bg);
    }

    .eliminated .image-wrap img {
      opacity: 0.4;
      filter: grayscale(0.15);
    }

    .stamp {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-18deg);
      border: 4px solid var(--stamp-red);
      color: var(--stamp-red);
      background: rgba(255, 255, 255, 0.7);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      .card-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 16px;
      }

      .tribe {
        padding: 16px;
      }

      .card-grid {
        grid-template-columns: 1fr;
      }

      .image-wrap {
        height: 320px;
      }

      .name {
        font-size: 1.5rem;
      }
    }
  </style>
